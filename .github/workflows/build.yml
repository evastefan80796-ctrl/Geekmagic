YAML
name: Build ESPHome Firmware

on:
  push: 
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
      uses: actions/checkout@v4

      - name: Build firmware
      uses: esphome/build-action@v6
      with:
        yaml-file: minitv.yaml

      - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build
        
      
